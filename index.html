<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>karasko</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Главная обертка для размещения виджета и ника в ряд */
        .main-wrapper {
            display: flex;
            align-items: center;
            gap: 40px; /* Расстояние между плеером и ником */
        }

        /* Стиль "Жидкое стекло" */
        .music-widget {
            display: flex;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0; /* Острые края */
            position: relative;
            opacity: 0;
            transform: translateX(-50px);
            transition: all 1s ease;
        }

        .widget-visible {
            opacity: 1;
            transform: translateX(0);
        }

        /* Иконка трека */
        .track-icon {
            width: 50px;
            height: 50px;
            background: #222;
            margin-right: 15px;
            opacity: 0;
            transform: translateY(-100px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .icon-fly-down {
            animation: flyDown 0.8s forwards;
        }

        /* Кнопки управления */
        .player-controls {
            display: flex;
            flex-direction: column;
            gap: 5px;
            opacity: 0;
        }

        .controls-appear {
            animation: fadeIn 0.5s forwards;
        }

        .btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 10px;
            font-weight: 900;
            padding: 4px 8px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover { background: white; color: black; }

        /* Громкость слева */
        .volume-container {
            display: flex;
            align-items: center;
            transform: rotate(-90deg);
            width: 0;
            overflow: hidden;
            transition: width 0.5s ease;
            margin-right: -20px;
            margin-left: -30px;
        }

        .volume-show {
            width: 80px;
        }

        input[type="range"] {
            cursor: pointer;
            accent-color: #ffffff;
            width: 60px;
        }

        /* Контейнер ника */
        .container { text-align: center; position: relative; }

        .name {
            font-size: clamp(3rem, 15vw, 8.5rem);
            font-weight: 900;
            letter-spacing: -6px;
            line-height: 1;
            opacity: 0;
            transform: translateY(-120px);
        }

        .hello {
            font-size: 1.5rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-top: 20px;
            opacity: 0;
        }

        /* Анимации */
        @keyframes flyDown {
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .animate-name { animation: flyDown 1.1s forwards ease-out; }
        .animate-hello { animation: fadeIn 1s forwards 2s; }

    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="music-widget" id="widget">
            <div class="volume-container" id="volCont">
                <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5">
            </div>

            <div class="track-icon" id="icon">♫</div>

            <div class="player-controls" id="controls">
                <button class="btn" id="playBtn">Play</button>
                <button class="btn" id="stopBtn">Stop</button>
            </div>
            
            <audio id="myaudio" src="https://open.spotify.com/track/3Zz4BKWJamsN9Cq8NekyfM?si=02f3b844b84e48cd"></audio>
        </div>

        <div class="container">
            <div class="name" id="name">karasko</div>
            <div class="hello" id="hello">hello guys</div>
        </div>
    </div>

    <script>
        const name = document.getElementById('name');
        const hello = document.getElementById('hello');
        const widget = document.getElementById('widget');
        const icon = document.getElementById('icon');
        const controls = document.getElementById('controls');
        const volCont = document.getElementById('volCont');
        const audio = document.getElementById('myaudio');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const volRange = document.getElementById('volume');

        window.onload = () => {
            // 1. Появление ника
            setTimeout(() => name.classList.add('animate-name'), 200);

            // 2. Появление основы виджета
            setTimeout(() => widget.classList.add('widget-visible'), 1200);

            // 3. Прилетает иконка сверху
            setTimeout(() => icon.classList.add('icon-fly-down'), 1800);

            // 4. Появляются кнопки
            setTimeout(() => controls.classList.add('controls-appear'), 2400);

            // 5. Выезжает громкость слева
            setTimeout(() => volCont.classList.add('volume-show'), 3000);

            // 6. Hello guys
            setTimeout(() => hello.classList.add('animate-hello'), 3500);
        };

        // Логика плеера
        playBtn.onclick = () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "Pause";
            } else {
                audio.pause();
                playBtn.innerText = "Play";
            }
        };

        stopBtn.onclick = () => {
            audio.pause();
            audio.currentTime = 0;
            playBtn.innerText = "Play";
        };

        volRange.oninput = (e) => {
            audio.volume = e.target.value;
        };
    </script>

</body>
</html>
