<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>karasko</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 150vh; /* Чтобы можно было поскроллить и проверить фиксацию */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- ПЛЕЕР СЛЕВА (ФИКСИРОВАННЫЙ) --- */
        .media-sidebar {
            position: fixed;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            width: 280px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1000;
        }

        /* Инфо о треке */
        .track-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .album-art {
            width: 40px;
            height: 40px;
            background: #222;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .track-text {
            display: flex;
            flex-direction: column;
        }

        .track-name { font-weight: 700; font-size: 0.9rem; }
        .artist-name { color: #888; font-size: 0.75rem; }

        /* Прогресс (только просмотр) */
        .progress-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #fff;
            transition: width 0.1s linear;
        }

        .time-codes {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-family: monospace;
            color: #666;
        }

        /* Управление и громкость в один ряд */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100px;
        }

        /* Кнопка Play */
        .play-btn {
            background: none;
            border: 2px solid #fff;
            color: #fff;
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .play-btn:hover {
            background: #fff;
            color: #000;
        }

        /* Вертикальная громкость (Жирная и круглая) */
        .volume-wrapper {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
        }

        input[type=range].vertical-vol {
            writing-mode: bt-lr; /* Для поддержки некоторых браузеров */
            appearance: slider-vertical;
            width: 12px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            outline: none;
            cursor: pointer;
        }

        /* Стилизация ползунка для Chrome/Safari */
        input[type=range].vertical-vol::-webkit-slider-runnable-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        input[type=range].vertical-vol::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: #ffffff;
            border-radius: 50%;
            cursor: pointer;
            margin-left: -2px;
        }

        /* --- ЦЕНТРАЛЬНЫЙ ТЕКСТ --- */
        .center-content {
            text-align: center;
        }

        .name {
            font-size: clamp(3rem, 15vw, 8.5rem);
            font-weight: 900;
            letter-spacing: -6px;
            line-height: 1;
        }

        .hello {
            font-size: clamp(1rem, 4vw, 2.4rem);
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-top: 20px;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="media-sidebar">
        <div class="track-info">
            <div class="album-art">♫</div>
            <div class="track-text">
                <span class="track-name">a-cup freestyle</span>
                <span class="artist-name">issbrokie</span>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-codes">
                <span id="currentTime">0:00</span>
                <span id="durationTime">0:00</span>
            </div>
        </div>

        <div class="controls-row">
            <button class="play-btn" id="playBtn">▶</button>
            
            <div class="volume-wrapper">
                <input type="range" class="vertical-vol" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            </div>
        </div>

        <audio id="mainAudio" src="https://files.catbox.moe/uozrbe.mp3"></audio>
    </div>

    <div class="center-content">
        <h1 class="name">karasko</h1>
        <p class="hello">hello guys</p>
    </div>

    <script>
        const audio = document.getElementById('mainAudio');
        const playBtn = document.getElementById('playBtn');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationTimeEl = document.getElementById('durationTime');
        const volumeSlider = document.getElementById('volumeSlider');

        // Play/Pause
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "II";
            } else {
                audio.pause();
                playBtn.innerText = "▶";
            }
        });

        // Форматирование времени (0:00)
        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' + sec : sec}`;
        }

        // Обновление прогресса
        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = percent + '%';
            currentTimeEl.innerText = formatTime(audio.currentTime);
        });

        // Установка длительности трека при загрузке
        audio.addEventListener('loadedmetadata', () => {
            durationTimeEl.innerText = formatTime(audio.duration);
        });

        // Громкость
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        // Сброс кнопки при окончании трека
        audio.addEventListener('ended', () => {
            playBtn.innerText = "▶";
            progressFill.style.width = '0%';
        });
    </script>

</body>
</html>
