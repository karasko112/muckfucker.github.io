<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>karasko</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            height: 100vh; /* Высота на весь экран */
            width: 100vw;
            overflow: hidden; /* Запрещаем прокрутку */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 5vh; /* Отступ от самого верха */
        }

        /* --- ВЕРХНЯЯ ЧАСТЬ (НИК И СОЦСЕТИ) --- */
        .header-section {
            text-align: center;
            z-index: 10;
        }

        .name {
            font-size: clamp(2.5rem, 10vw, 6rem);
            font-weight: 900;
            letter-spacing: -4px;
            line-height: 1;
            opacity: 0;
            transform: translateY(-50px);
            animation: slideDown 1s forwards ease-out;
        }

        .hello {
            font-size: clamp(0.8rem, 3vw, 1.5rem);
            font-weight: 400;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-top: 10px;
            color: #888;
            opacity: 0;
            animation: fadeIn 0.8s forwards 1s;
        }

        .socials {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
            opacity: 0;
            animation: fadeIn 0.8s forwards 1.5s;
        }

        .social-link {
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
        }

        .social-link:hover {
            background: #fff;
            color: #000;
        }

        /* --- ПЛЕЕР (ЦЕНТР) --- */
        .player-wrapper {
            flex-grow: 1; /* Занимает оставшееся место */
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .media-card {
            width: 300px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            animation: fadeIn 1s forwards 2s;
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .track-icon {
            width: 60px;
            height: 60px;
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .track-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .track-text {
            display: flex;
            flex-direction: column;
        }

        .track-name { font-size: 0.9rem; font-weight: 700; }
        .track-author { font-size: 0.7rem; color: #666; }

        .controls-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .play-btn {
            background: white;
            color: black;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 60%;
        }

        .vol-slider {
            flex-grow: 1;
            appearance: none;
            height: 3px;
            background: #333;
            outline: none;
        }

        .vol-slider::-webkit-slider-thumb {
            appearance: none;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
        }

        .progress-bar-container {
            width: 100%;
        }

        .progress-bg {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            cursor: pointer;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #fff;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: #555;
            margin-top: 5px;
        }

        /* Анимации */
        @keyframes slideDown { to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="name">karasko</div>
        <div class="hello">hello guys</div>
        <div class="socials">
            <a href="https://t.me/visulavskiq" target="_blank" class="social-link">Telegram</a>
            <a href="https://discord.com/users/sin_shlyhu" target="_blank" class="social-link">Discord</a>
        </div>
    </div>

    <div class="player-wrapper">
        <div class="media-card">
            <div class="track-info">
                <div class="track-icon">
                    <img src="cover.jpg" alt="♫" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMCIgaGVpZ2h0PSIxMCI+PHJlY3Qgd2lkdGg9IjEwIiBoZWlnaHQ9IjEwIiBmaWxsPSIjMjIyIi8+PC9zdmc+'">
                </div>
                <div class="track-text">
                    <span class="track-name">WTFG!</span>
                    <span class="track-author">ISSBROKIE · BLCKK</span>
                </div>
            </div>

            <div class="progress-bar-container">
                <div class="progress-bg" id="progLine">
                    <div class="progress-fill" id="progFill"></div>
                </div>
                <div class="time-info">
                    <span id="currTime">0:00</span>
                    <span id="durTime">0:00</span>
                </div>
            </div>

            <div class="controls-main">
                <button class="play-btn" id="playToggle">▶</button>
                <div class="volume-container">
                    <span style="font-size: 0.7rem">vol</span>
                    <input type="range" class="vol-slider" id="volControl" min="0" max="100" value="50">
                </div>
            </div>

            <audio id="audioTrack" src="track.mp3"></audio>
        </div>
    </div>

    <script>
        const audio = document.getElementById('audioTrack');
        const playBtn = document.getElementById('playToggle');
        const progFill = document.getElementById('progFill');
        const progLine = document.getElementById('progLine');
        const currTimeTxt = document.getElementById('currTime');
        const durTimeTxt = document.getElementById('durTime');
        const volControl = document.getElementById('volControl');

        // Play/Pause
        playBtn.onclick = () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "II";
            } else {
                audio.pause();
                playBtn.innerText = "▶";
            }
        };

        // Обновление времени и полоски
        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            progFill.style.width = (pct || 0) + '%';
            currTimeTxt.innerText = formatTime(audio.currentTime);
        };

        audio.onloadedmetadata = () => {
            durTimeTxt.innerText = formatTime(audio.duration);
        };

        // Перемотка кликом по полоске
        progLine.onclick = (e) => {
            const width = progLine.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            audio.currentTime = (clickX / width) * duration;
        };

        // Громкость
        volControl.oninput = (e) => {
            audio.volume = e.target.value / 100;
        };

        function formatTime(s) {
            if (isNaN(s)) return "0:00";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return m + ":" + (sec < 10 ? '0' + sec : sec);
        }

        audio.onended = () => { playBtn.innerText = "▶"; progFill.style.width = '0%'; };
        audio.volume = 0.5;
    </script>
</body>
</html>
