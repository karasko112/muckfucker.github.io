<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>karasko</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .container {
            text-align: center;
            position: relative;
        }

        .hello {
            font-size: 2.2rem;
            font-weight: 400;
            opacity: 0;
            letter-spacing: 8px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .name {
            font-size: 7.5rem;
            font-weight: 900;
            letter-spacing: -4px;
            position: relative;
            display: inline-block;
            opacity: 0;
            transform: translateY(-150px);
        }

        .bracket-left,
        .bracket-right {
            font-size: 7.5rem;
            font-weight: 900;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0;
            transition: all 0.8s ease;
        }

        .bracket-left {
            left: -80px;
        }

        .bracket-right {
            right: -80px;
        }

        /* Анимации */
        @keyframes slideDown {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-name {
            animation: slideDown 1.2s forwards ease-out;
        }

        .animate-hello {
            animation: fadeInUp 1s forwards 0.6s;
        }

        .animate-brackets {
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="hello" id="hello">hello guys</div>
        <div class="name" id="name">karasko</div>
        <span class="bracket-left" id="left">[</span>
        <span class="bracket-right" id="right">]</span>
    </div>

    <script>
        const name = document.getElementById('name');
        const hello = document.getElementById('hello');
        const left = document.getElementById('left');
        const right = document.getElementById('right');

        // Запускаем анимацию сразу при загрузке страницы
        window.onload = () => {
            // 1. Ник выезжает сверху вниз
            setTimeout(() => {
                name.classList.add('animate-name');
            }, 300);

            // 2. Появляется "hello guys"
            setTimeout(() => {
                hello.classList.add('animate-hello');
            }, 1200);

            // 3. Выезжают квадратные скобки
            setTimeout(() => {
                left.style.transitionDelay = '0.3s';
                right.style.transitionDelay = '0.3s';
                left.classList.add('animate-brackets');
                right.classList.add('animate-brackets');
            }, 2200);
        };
    </script>

</body>
</html>
