<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>karasko</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Общая обертка */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding: 20px;
        }

        /* --- МЕДИАПЛЕЕР (Виджет) --- */
        .media-bar {
            width: clamp(300px, 90vw, 500px);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 1s ease;
        }

        .widget-visible { opacity: 1; transform: translateY(0); }

        /* Верхняя часть: Инфо о треке */
        .bar-track { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            opacity: 0; 
            transform: translateY(-50px);
        }

        .bar-album-placeholder {
            width: 45px;
            height: 45px;
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .bar-text { flex-grow: 1; }
        .bar-track-name { font-weight: 700; font-size: 1rem; }
        .bar-artist-name { color: #666; font-size: 0.8rem; }

        /* Прогресс-бар */
        .bar-progress { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 0.7rem; 
            font-family: monospace;
            opacity: 0;
        }

        .bar-scrubber {
            flex-grow: 1;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .bar-scrubber-filled {
            width: 15%; /* Имитация прогресса */
            height: 100%;
            background: white;
        }

        /* Кнопки управления */
        .bar-controls { 
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            opacity: 0;
        }

        .bar-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: 900;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .play-main {
            font-size: 1.8rem;
            border: 2px solid white;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Громкость */
        .bar-volume {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 80%;
            margin: 0 auto;
            opacity: 0;
        }

        .vol-line {
            flex-grow: 1;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
        }

        .vol-line-filled {
            width: 60%;
            height: 100%;
            background: rgba(255, 255, 255, 0.5);
        }

        /* --- ТВОЙ НИК И ТЕКСТ --- */
        .container { text-align: center; }

        .name {
            font-size: clamp(3rem, 15vw, 8.5rem);
            font-weight: 900;
            letter-spacing: -6px;
            line-height: 1;
            opacity: 0;
            transform: translateY(-100px);
        }

        .hello {
            font-size: clamp(1rem, 4vw, 2.4rem);
            font-weight: 400;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-top: 20px;
            opacity: 0;
        }

        /* Глитч-эффект для иконок */
        .glitch {
            text-shadow: -2px 0 #ff003c, 2px 0 #3c00ff;
        }

        /* Анимации появления */
        .animate { animation: fadeIn 0.8s forwards ease-out; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        .slide-down { animation: slideDown 1.1s forwards ease-out; }
        @keyframes slideDown { to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="media-bar" id="widget">
            
            <div class="bar-track" id="trackInfo">
                <div class="bar-album-placeholder glitch">♫</div>
                <div class="bar-text">
                    <div class="bar-track-name">karasko_sound</div>
                    <div class="bar-artist-name">Spotify Stream</div>
                </div>
                <div class="glitch" style="font-size: 12px;">▲</div>
            </div>

            <div class="bar-progress" id="progressInfo">
                <span>0:51</span>
                <div class="bar-scrubber"><div class="bar-scrubber-filled"></div></div>
                <span>-3:45</span>
            </div>

            <div class="bar-controls" id="controlsInfo">
                <button class="bar-btn">REV</button>
                <button class="bar-btn play-main glitch" id="playBtn">▶</button>
                <button class="bar-btn">FWD</button>
            </div>

            <div class="bar-volume" id="volumeInfo">
                <span style="font-size: 10px;">🔈</span>
                <div class="vol-line"><div class="vol-line-filled"></div></div>
                <span style="font-size: 10px;">🔊</span>
            </div>

            <audio id="audio" src="https://open.spotify.com/track/3Zz4BKWJamsN9Cq8NekyfM?si=02f3b844b84e48cd"></audio>
        </div>

        <div class="container">
            <div class="name" id="name">karasko</div>
            <div class="hello" id="hello">hello guys</div>
        </div>

    </div>

    <script>
        const elements = {
            name: document.getElementById('name'),
            hello: document.getElementById('hello'),
            widget: document.getElementById('widget'),
            track: document.getElementById('trackInfo'),
            progress: document.getElementById('progressInfo'),
            controls: document.getElementById('controlsInfo'),
            volume: document.getElementById('volumeInfo'),
            audio: document.getElementById('audio'),
            playBtn: document.getElementById('playBtn')
        };

        window.onload = () => {
            // 1. Сначала вылетает ник
            setTimeout(() => elements.name.classList.add('slide-down'), 200);

            // 2. Появляется стеклянная основа плеера
            setTimeout(() => elements.widget.classList.add('widget-visible'), 1000);

            // 3. Прилетает инфо о треке сверху
            setTimeout(() => elements.track.classList.add('animate'), 1500);

            // 4. Проявляются кнопки и прогресс
            setTimeout(() => elements.progress.classList.add('animate'), 2000);
            setTimeout(() => elements.controls.classList.add('animate'), 2300);

            // 5. Появляется громкость
            setTimeout(() => elements.volume.classList.add('animate'), 2800);

            // 6. Финальная надпись
            setTimeout(() => elements.hello.classList.add('animate'), 3300);
        };

        // Логика кнопки Play
        elements.playBtn.onclick = () => {
            if (elements.audio.paused) {
                elements.audio.play();
                elements.playBtn.innerText = "II"; // Пауза
            } else {
                elements.audio.pause();
                elements.playBtn.innerText = "▶";
            }
        };
    </script>
</body>
</html>
