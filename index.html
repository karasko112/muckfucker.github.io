<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>karasko</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            position: relative;
            padding: 0 20px;
        }

        .name-wrapper {
            position: relative;
            display: inline-block;
        }

        .name {
            /* Используем clamp, чтобы шрифт уменьшался на маленьких экранах */
            font-size: clamp(3rem, 15vw, 8.5rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 1;
            opacity: 0;
            transform: translateY(-50px);
            position: relative;
            z-index: 2;
        }

        .hello {
            font-size: clamp(1rem, 4vw, 2.4rem);
            font-weight: 400;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-top: 20px;
            opacity: 0;
        }

        .bracket-left,
        .bracket-right {
            font-size: clamp(3rem, 15vw, 8.5rem);
            font-weight: 900;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0;
            color: #444; /* Сделал скобки чуть тусклее для глубины */
            transition: color 0.3s;
        }

        .bracket-left { left: -0.6em; }
        .bracket-right { right: -0.6em; }

        /* Анимации */
        @keyframes slideIn {
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Эффект легкого парения после появления */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .animate-name {
            animation: slideIn 1.1s forwards ease-out;
        }

        .animate-brackets {
            animation: fadeIn 0.8s forwards 0.5s;
        }

        .animate-hello {
            animation: fadeIn 1s forwards 1.2s;
        }

        .floating {
            animation: float 4s ease-in-out infinite;
        }

        /* Интерактив при наведении */
        .name-wrapper:hover .bracket-left,
        .name-wrapper:hover .bracket-right {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="name-wrapper floating">
            <div class="name" id="name">karasko</div>
            <span class="bracket-left" id="left">[</span>
            <span class="bracket-right" id="right">]</span>
        </div>
        <div class="hello" id="hello">hello guys</div>
    </div>

    <script>
        const name = document.getElementById('name');
        const hello = document.getElementById('hello');
        const left = document.getElementById('left');
        const right = document.getElementById('right');

        window.onload = () => {
            name.classList.add('animate-name');
            left.classList.add('animate-brackets');
            right.classList.add('animate-brackets');
            hello.classList.add('animate-hello');
        };
    </script>

</body>
</html>
