<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>karasko</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-section {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* --- ПЛЕЕР --- */
        .media-sidebar {
            position: absolute;
            left: 30px;
            top: 50vh;
            transform: translateY(-50%);
            width: 220px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            opacity: 0;
        }

        .album-art {
            width: 80px;
            height: 80px;
            background: #222;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto;
            opacity: 0;
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px;
            padding: 0 10px;
        }

        .play-btn {
            background: none;
            border: 2px solid #fff;
            color: #fff;
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            opacity: 0;
        }

        .play-btn:hover {
            background: #fff;
            color: #000;
        }

        .vol-wrapper {
            position: relative;
            width: 40px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }

        .vol-tooltip {
            position: absolute;
            top: -25px;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .vol-wrapper:hover .vol-tooltip { opacity: 1; }

        .vol-slider {
            appearance: none;
            width: 80px;
            height: 6px;
            background: #111;
            border: 1px solid #800080;
            border-radius: 4px;
            outline: none;
            transform: rotate(-90deg);
            cursor: pointer;
        }

        .vol-slider::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid #800080;
            cursor: pointer;
        }

        .progress-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            opacity: 0;
        }

        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #fff;
            transition: width 0.1s linear;
        }

        .time-codes {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-family: monospace;
            color: #666;
        }

        /* --- ЦЕНТРАЛЬНЫЙ ТЕКСТ --- */
        .container { text-align: center; }

        .name {
            font-size: clamp(3rem, 15vw, 8.5rem);
            font-weight: 900;
            letter-spacing: -6px;
            line-height: 1;
            opacity: 0;
            transform: translateY(-120px);
        }

        .hello {
            font-size: clamp(1rem, 4vw, 2.4rem);
            font-weight: 400;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-top: 30px;
            opacity: 0;
        }

        /* --- СОЦСЕТИ --- */
        .socials-section {
            padding-bottom: 100px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .social-link {
            padding: 15px 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            color: white;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .social-link:hover {
            background: white;
            color: black;
            border-color: white;
        }

        /* --- АНИМАЦИИ --- */
        @keyframes slideDown { to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes elementAppear {
            from { transform: translateY(15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .animate-name { animation: slideDown 1.1s forwards ease-out; }
        .animate-hello { animation: fadeIn 0.8s forwards 1.2s; } /* Ускорил до 1.2s */
        .animate-widget { animation: fadeIn 0.8s forwards 1.8s; }
        .animate-icon { animation: elementAppear 0.6s forwards 2.2s; }
        .animate-vol { animation: elementAppear 0.6s forwards 2.5s; }
        .animate-time { animation: elementAppear 0.6s forwards 2.8s; }
        .animate-play { animation: elementAppear 0.6s forwards 3.1s; }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="media-sidebar" id="mediaSidebar">
            <div class="album-art" id="elIcon">♫</div>
            
            <div class="controls-row">
                <button class="play-btn" id="playBtn">▶</button>
                <div class="vol-wrapper" id="elVol">
                    <div class="vol-tooltip" id="volValue">50</div>
                    <input type="range" class="vol-slider" id="volumeSlider" min="0" max="100" value="50">
                </div>
            </div>

            <div class="progress-container" id="elTime">
                <div class="progress-bar-bg">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="time-codes">
                    <span id="currentTime">0:00</span>
                    <span id="durationTime">0:00</span>
                </div>
            </div>

            <audio id="mainAudio" src="track.mp3"></audio>
        </div>

        <div class="container">
            <div class="name" id="name">karasko</div>
            <div class="hello" id="hello">hello guys</div>
        </div>
    </div>

    <div class="socials-section">
        <a href="https://discord.com/users/sin_shlyhu" target="_blank" class="social-link">Discord</a>
        <a href="https://t.me/visulavskiq" target="_blank" class="social-link">Telegram</a>
    </div>

    <script>
        const elements = {
            name: document.getElementById('name'),
            hello: document.getElementById('hello'),
            widget: document.getElementById('mediaSidebar'),
            icon: document.getElementById('elIcon'),
            vol: document.getElementById('elVol'),
            time: document.getElementById('elTime'),
            play: document.getElementById('playBtn'),
            audio: document.getElementById('mainAudio'),
            fill: document.getElementById('progressFill'),
            curr: document.getElementById('currentTime'),
            dur: document.getElementById('durationTime'),
            vSlider: document.getElementById('volumeSlider'),
            vTooltip: document.getElementById('volValue')
        };

        window.onload = () => {
            elements.name.classList.add('animate-name');
            elements.hello.classList.add('animate-hello');
            elements.widget.classList.add('animate-widget');
            elements.icon.classList.add('animate-icon');
            elements.vol.classList.add('animate-vol');
            elements.time.classList.add('animate-time');
            elements.play.classList.add('animate-play');
        };

        elements.play.onclick = () => {
            if (elements.audio.paused) {
                elements.audio.play();
                elements.play.innerText = "II";
            } else {
                elements.audio.pause();
                elements.play.innerText = "▶";
            }
        };

        function formatTime(s) {
            if (isNaN(s)) return "0:00";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return m + ":" + (sec < 10 ? '0' + sec : sec);
        }

        elements.audio.ontimeupdate = () => {
            const p = (elements.audio.currentTime / elements.audio.duration) * 100;
            elements.fill.style.width = (p || 0) + '%';
            elements.curr.innerText = formatTime(elements.audio.currentTime);
        };

        elements.audio.onloadedmetadata = () => {
            elements.dur.innerText = formatTime(elements.audio.duration);
        };

        elements.vSlider.oninput = (e) => {
            const v = e.target.value;
            elements.audio.volume = v / 100;
            elements.vTooltip.innerText = v;
        };

        elements.audio.onended = () => {
            elements.play.innerText = "▶";
            elements.fill.style.width = '0%';
        };
        
        elements.audio.volume = 0.5;
    </script>
</body>
</html>
